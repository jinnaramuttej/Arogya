<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚑 Driver Console</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 22px;
        }

        .id-badge {
            background: #333;
            padding: 5px 12px;
            border-radius: 6px;
            font-family: monospace;
            color: #aaa;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .status {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            padding: 10px;
            border-radius: 10px;
            background: #222;
        }

        .status.on {
            background: rgba(0, 230, 118, 0.1);
            color: #00e676;
            border: 1px solid #00e676;
        }

        .debug-info { font-size: 12px; color: #555; margin-top: 10px; }

        button {
            width: 100%;
            padding: 18px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-go {
            background: #2979ff;
            color: white;
            box-shadow: 0 4px 15px rgba(41, 121, 255, 0.4);
        }

        .btn-stop {
            background: #ff1744;
            color: white;
            display: none;
        }

        .btn-crit {
            background: #333;
            color: #888;
            border: 2px solid #444;
        }

        .btn-crit.active {
            background: #d50000;
            color: white;
            border-color: #ff5252;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(213, 0, 0, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(213, 0, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(213, 0, 0, 0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🚑 Ambulance Driver</h1>
        <div class="id-badge">ID: <span id="driverId">...</span></div>

        <div id="status" class="status">🔴 OFFLINE</div>
        <div id="debug" class="debug-info">Waiting to start...</div>

        <button class="btn-go" id="btn-start" onclick="startShift()">🟢 START SHIFT</button>
        <button class="btn-stop" id="btn-stop" onclick="endShift()">🛑 END SHIFT</button>
        <button class="btn-crit" id="btn-crit" onclick="toggleCritical()">⚠️ NORMAL MODE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onDisconnect, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDDV-p_a_-GyLGjAsaaLFkVLk79x3JqFyA",
            authDomain: "asish-f7dd3.firebaseapp.com",
            projectId: "asish-f7dd3",
            databaseURL: "https://asish-f7dd3-default-rtdb.firebaseio.com",
            storageBucket: "asish-f7dd3.firebasestorage.app",
            messagingSenderId: "120249700723",
            appId: "1:120249700723:web:22f1c37d6666f0c97f7506",
            measurementId: "G-KKX5X8VD6M"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Persistent ID
        let myId = localStorage.getItem("amb_id") || "AMB-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem("amb_id", myId);
        document.getElementById("driverId").innerText = myId;

        let watchId = null;
        let isCritical = false;

        window.startShift = () => {
            if (!navigator.geolocation) return alert("GPS Required!");

            document.getElementById("btn-start").style.display = "none";
            document.getElementById("btn-stop").style.display = "block";
            document.getElementById("status").innerText = "📡 LIVE BROADCASTING";
            document.getElementById("status").classList.add("on");

            const refLink = ref(db, 'ambulances/' + myId);
            
            // Set status to online immediately
            update(refLink, { status: 'online', timestamp: Date.now() });
            
            // Handle disconnect (e.g., tab close, network loss)
            onDisconnect(refLink).update({ status: 'offline', timestamp: Date.now() });

            watchId = navigator.geolocation.watchPosition(pos => {
                const updates = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    speed: pos.coords.speed || 0,
                    heading: pos.coords.heading || 0,
                    timestamp: Date.now(),
                    isCritical: isCritical,
                    status: "online"
                };
                update(refLink, updates)
                    .then(() => {
                        document.getElementById("debug").innerText = "Last Sent: " + new Date().toLocaleTimeString();
                    })
                    .catch(err => {
                        document.getElementById("debug").innerText = "Error: " + err.message;
                    });
            }, err => console.error(err), { enableHighAccuracy: true });
        };

        window.endShift = () => {
            navigator.geolocation.clearWatch(watchId);
            
            // Explicitly set offline before reloading
            const refLink = ref(db, 'ambulances/' + myId);
            update(refLink, { status: 'offline', timestamp: Date.now() }).then(() => {
                window.location.reload();
            });
        };

        window.toggleCritical = () => {
            isCritical = !isCritical;
            const btn = document.getElementById("btn-crit");
            if (isCritical) {
                btn.innerText = "🚨 CRITICAL MODE ON";
                btn.classList.add("active");
            } else {
                btn.innerText = "⚠️ NORMAL MODE";
                btn.classList.remove("active");
            }
            // Force update if live
            if (watchId) { navigator.geolocation.getCurrentPosition(p => { }, e => { }, { timeout: 100 }); }
        };
    </script>
</body>

</html>
