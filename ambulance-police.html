<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👮 Traffic Alert</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: background 0.3s;
        }

        .box {
            padding: 40px;
            border-radius: 20px;
            background: #222;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            color: #aaa;
        }

        .sub {
            color: #666;
            margin-top: 10px;
            font-size: 16px;
        }

        /* ALERT STYLES */
        body.alert {
            background: #b71c1c;
            animation: flash 0.5s infinite alternate;
        }

        body.alert .box {
            background: white;
            color: #d50000;
        }

        body.alert h1 {
            color: #d50000;
            font-weight: 900;
            font-size: 40px;
        }

        body.alert .sub {
            color: black;
            font-weight: bold;
            font-size: 24px;
        }

        .dist-big {
            font-size: 60px;
            font-weight: 800;
            display: block;
            margin: 10px 0;
        }

        button {
            margin-top: 30px;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
        }

        @keyframes flash {
            from {
                background: #b71c1c;
            }

            to {
                background: #ff1744;
            }
        }
    </style>
</head>

<body>

    <div class="box">
        <span class="icon" id="icon">👮</span>
        <h1 id="status">Scanning Road...</h1>
        <div class="sub" id="sub">No critical units nearby</div>

        <div id="alert-ui" style="display:none;">
            <span class="dist-big" id="dist">0.0 km</span>
            <span>APPROACHING FAST</span>
        </div>

        <button onclick="initAudio()" id="btn-audio">🔇 Enable Voice Alerts</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDDV-p_a_-GyLGjAsaaLFkVLk79x3JqFyA",
            authDomain: "asish-f7dd3.firebaseapp.com",
            projectId: "asish-f7dd3",
            databaseURL: "https://asish-f7dd3-default-rtdb.firebaseio.com",
            storageBucket: "asish-f7dd3.firebasestorage.app",
            messagingSenderId: "120249700723",
            appId: "1:120249700723:web:22f1c37d6666f0c97f7506",
            measurementId: "G-KKX5X8VD6M"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myLoc = null;
        let audioOn = false;

        navigator.geolocation.getCurrentPosition(p => {
            myLoc = { lat: p.coords.latitude, lng: p.coords.longitude };
        }, e => alert("GPS Needed for Police Mode"));

        window.initAudio = () => {
            const u = new SpeechSynthesisUtterance("System Ready");
            window.speechSynthesis.speak(u);
            audioOn = true;
            document.getElementById("btn-audio").style.display = 'none';
        };

        const speak = (km) => {
            if (!audioOn || window.speechSynthesis.speaking) return;
            const u = new SpeechSynthesisUtterance(`Warning! Ambulance ${km} kilometers away.`);
            u.rate = 1.2;
            window.speechSynthesis.speak(u);
        };

        onValue(ref(db, 'ambulances/'), snap => {
            if (!myLoc || !snap.exists()) return;
            const data = snap.val();
            let minDist = 9999;

            Object.values(data).forEach(amb => {
                if (!amb.isCritical || (Date.now() - amb.timestamp > 300000)) return;
                const d = getDist(myLoc.lat, myLoc.lng, amb.lat, amb.lng);
                if (d < minDist) minDist = d;
            });

            // TRIGGER DISTANCE: 5 KM
            if (minDist < 5) {
                document.body.className = "alert";
                document.getElementById("icon").innerText = "🚑💨";
                document.getElementById("status").innerText = "CLEAR THE ROAD!";
                document.getElementById("sub").style.display = 'none';
                document.getElementById("alert-ui").style.display = 'block';
                document.getElementById("dist").innerText = minDist.toFixed(1) + " km";
                speak(minDist.toFixed(1));
            } else {
                document.body.className = "";
                document.getElementById("icon").innerText = "👮";
                document.getElementById("status").innerText = "Scanning Road...";
                document.getElementById("sub").style.display = 'block';
                document.getElementById("alert-ui").style.display = 'none';
            }
        });

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }
    </script>
</body>

</html>
